name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: latest

      - name: Build
        run: |
          python build.py

      - name: Run tests
        run: |
          echo "Running E# compiler tests..."
          if [ -f "bin/e_sharp" ]; then
            echo "Testing array example..."
            ./bin/e_sharp examples/test_array_simple2.esf || exit 1
            echo "Test passed!"
          else
            echo "Error: bin/e_sharp not found"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e_sharp-ubuntu
          path: |
            bin/e_sharp
            bin/*.exe